<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VERDORA</title>

<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#f5f7f5;
}

/* HEADER */
.header{
  background:#2e7d32;
  color:white;
  padding:12px 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

/* LOGO */
.logo{
  font-size:24px;
  font-weight:bold;
}

/* SEARCH */
.search input{
  padding:10px 15px;
  width:280px;
  border-radius:25px;
  border:none;
  outline:none;
}

/* NAV */
.nav-icons{
  display:flex;
  align-items:center;
  gap:18px;
  font-size:14px;
}

.nav-icons span{
  cursor:pointer;
  transition:0.3s;
}

.nav-icons span:hover{
  text-decoration:underline;
}

/* PROFILE */
.profile{
  position:relative;
  cursor:pointer;
  font-size:18px;
}

.profile-menu{
  display:none;
  position:absolute;
  right:0;
  top:30px;
  background:white;
  color:black;
  border-radius:8px;
  width:150px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  overflow:hidden;
}

.profile-menu p{
  padding:10px;
  margin:0;
  cursor:pointer;
}

.profile-menu p:hover{
  background:#f1f1f1;
}

/* LAYOUT */
.container{
  display:flex;
  height:90vh;
}

/* SIDEBAR */
.sidebar{
  width:130px;
  background:white;
  border-right:1px solid #ddd;
  overflow:auto;
}

.cat{
  padding:14px;
  text-align:center;
  cursor:pointer;
  font-size:14px;
  transition:0.3s;
}

.cat:hover{
  background:#f1f1f1;
}

.cat.active{
  background:#e8f5e9;
  font-weight:bold;
}

/* MAIN */
.main{
  flex:1;
  padding:15px;
  overflow:auto;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:15px;
}

/* CARD */
.card{
  background:white;
  padding:12px;
  border-radius:12px;
  box-shadow:0 3px 12px rgba(0,0,0,0.1);
  text-align:center;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-3px);
}

.card img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:10px;
}

.en{font-weight:bold}
.tan{font-size:13px;color:#555}
.ta{font-size:14px;color:#2e7d32}

.price{
  color:#2e7d32;
  font-weight:bold;
  margin-top:5px;
}

/* BUTTON */
.btn{
  margin-top:8px;
  background:#2e7d32;
  color:white;
  border:none;
  padding:7px 12px;
  border-radius:6px;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  background:#1b5e20;
}

</style>
</head>

<body>

  <div class="logo">VERDORA</div>

  <div class="search">
    <input type="text" placeholder="Search groceries..." oninput="searchData(this.value)">
  </div>

  <div class="nav-icons">
    <span onclick="goHome()">Home</span>
    <span onclick="showWishlist()">Wishlist</span>
    <span onclick="showCart()">Cart (<span id="cartCount">0</span>)</span>

    <div class="profile" onclick="toggleProfileMenu()">
      Profile
      <div class="profile-menu" id="profileMenu">
        <p onclick="showProfile()">My Profile</p>
        <p onclick="logout()">Logout</p>
      </div>
    </div>
  </div>
</div>

let current=0;

/* SIDEBAR */
function renderSidebar(){
  sidebar.innerHTML = data.map((c,i)=>`
    <div class="cat ${i===current?'active':''}" onclick="selectCat(${i})">
      ${c.name}
    </div>
  `).join('');
}

/* PRODUCTS */
function renderProducts(list){
  main.innerHTML = `
  <div class="grid">
    ${list.map(item=>`
      <div class="card" onclick="openProduct('${item.en}')">
        <img src="${getImage(item.en)}">
        <div class="en">${item.en}</div>
        <div class="tan">${item.tan}</div>
        <div class="ta">${item.ta}</div>
        <div class="price">₹${Math.floor(Math.random()*100+30)}</div>
        <button class="btn" onclick="event.stopPropagation(); addToCart('${item.en}')">Add</button>
      </div>
    `).join('')}
  </div>`;
}

/* CATEGORY */
function selectCat(i){
  current=i;
  renderSidebar();
  renderProducts(data[i].items);
}

/* SEARCH */
function searchData(q){
  q=q.toLowerCase();
  let results=[];

  data.forEach(cat=>{
    cat.items.forEach(item=>{
      if(item.en.toLowerCase().includes(q) || item.tan.toLowerCase().includes(q)){
        results.push(item);
      }
    });
  });

  renderProducts(results);
}

/* CART */
function addToCart(item){
  cartCount++;
  document.getElementById("cartCount").innerText = cartCount;
  alert(item+" added to Cart");
}

/* PRODUCT PAGE */
function openProduct(name){
  alert("Open product page for "+name);
}

/* PROFILE */
function toggleProfileMenu(){
  let menu=document.getElementById("profileMenu");
  menu.style.display = menu.style.display==="block"?"none":"block";
}

/* CLOSE DROPDOWN */
document.addEventListener("click", function(e){
  let profile=document.querySelector(".profile");
  let menu=document.getElementById("profileMenu");

  if(!profile.contains(e.target)){
    menu.style.display="none";
  }
});

/* NAV */
function goHome(){
  renderProducts(data[current].items);
}

function showCart(){
  alert("Cart Page (next step)");
}

function showWishlist(){
  alert("Wishlist Page (next step)");
}

function showProfile(){
  alert("Profile Page (next step)");
}

function logout(){
  alert("Logged out");
}

/* INIT */
renderSidebar();
renderProducts(data[0].items);

</script>
